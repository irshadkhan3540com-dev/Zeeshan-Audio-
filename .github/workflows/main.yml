      - name: 6. Build High-Performance PDF Extractor (PDFExtractor.kt)
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/audio/utils/PDFExtractor.kt
          package com.zeeshan.audio.utils

          import android.content.Context
          import android.net.Uri
          import com.tom_roush.pdfbox.android.PDFBoxResourceLoader
          import com.tom_roush.pdfbox.pdmodel.PDDocument
          import com.tom_roush.pdfbox.text.PDFTextStripper
          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.withContext

          object PDFExtractor {
              fun init(context: Context) {
                  PDFBoxResourceLoader.init(context)
              }

              suspend fun extractText(context: Context, uri: Uri): String = withContext(Dispatchers.IO) {
                  var pdfDocument: PDDocument? = null
                  try {
                      val inputStream = context.contentResolver.openInputStream(uri)
                      pdfDocument = PDDocument.load(inputStream)
                      val stripper = PDFTextStripper().apply {
                          sortByPosition = true
                      }
                      return@withContext stripper.getText(pdfDocument) ?: ""
                  } catch (e: Exception) {
                      e.printStackTrace()
                      return@withContext "ร ยคยชร ยฅโฌร ยคยกร ยฅโฌร ยคยร ยคยซ ร ยคโขร ยฅโน ร ยคยกร ยฅโฌร ยคโขร ยฅโนร ยคยก ร ยคโขร ยคยฐร ยคยจร ยฅโก ร ยคยฎร ยฅโกร ยคโ ร ยคยตร ยคยฟร ยคยซร ยคยฒ: ${e.localizedMessage}"
                  } finally {
                      try { pdfDocument?.close() } catch (ex: Exception) {}
                  }
              }
          }
          EOF

      - name: 7. Build Core AI Speech Engine (TTSEngineManager.kt)
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/audio/engine/TTSEngineManager.kt
          package com.zeeshan.audio.engine

          import android.content.ContentValues
          import android.content.Context
          import android.os.Build
          import android.os.Bundle
          import android.os.Environment
          import android.provider.MediaStore
          import android.speech.tts.TextToSpeech
          import android.speech.tts.UtteranceProgressListener
          import java.io.File
          import java.util.Locale

          class TTSEngineManager(private val context: Context, private val onReady: () -> Unit) {
              private var tts: TextToSpeech? = null
              private var isInitialized = false

              init {
                  tts = TextToSpeech(context) { status ->
                      if (status == TextToSpeech.SUCCESS) {
                          val result = tts?.setLanguage(Locale("hi", "IN"))
                          if (result == TextToSpeech.LANG_MISSING_DATA || result == TextToSpeech.LANG_NOT_SUPPORTED) {
                              tts?.setLanguage(Locale.US)
                          }
                          tts?.setPitch(1.0f)
                          isInitialized = true
                          onReady()
                      }
                  }
              }

              fun setSpeed(speed: Float) {
                  if (isInitialized) tts?.setSpeechRate(speed)
              }

              fun speakLive(text: String) {
                  if (!isInitialized || text.isEmpty()) return
                  tts?.stop()
                  val chunks = text.chunked(3000)
                  chunks.forEachIndexed { index, chunk ->
                      tts?.speak(chunk, TextToSpeech.QUEUE_ADD, null, "chunk_$index")
                  }
              }

              fun exportToGallery(text: String, title: String, onStatusUpdate: (String) -> Unit) {
                  if (!isInitialized || text.isEmpty()) {
                      onStatusUpdate("ร ยคยธร ยคยฟร ยคยธร ยฅยร ยคลธร ยคยฎ ร ยคยร ยคยฐร ยคยฐ: ร ยคลธร ยฅโกร ยคโขร ยฅยร ยคยธร ยฅยร ยคลธ ร ยคโร ยคยพร ยคยฒร ยฅโฌ ร ยคยนร ยฅห ร ยคยฏร ยคยพ ร ยคยตร ยฅโฐร ยคโกร ยคยธ ร ยคโกร ยคโร ยคลร ยคยจ ร ยคยฒร ยฅโนร ยคยก ร ยคยจร ยคยนร ยฅโฌร ยคโ ร ยคยนร ยฅยร ยคโ ร ยฅยค")
                      return
                  }
                  onStatusUpdate("ร ยคยธร ยฅยร ยคยฎร ยคยพร ยคยฐร ยฅยร ยคลธ ร ยคยฐร ยคยฟร ยคโขร ยฅโฐร ยคยฐร ยฅยร ยคยกร ยคยฐ ร ยคยธร ยคโขร ยฅยร ยคยฐร ยคยฟร ยคยฏ: ร ยคลธร ยฅยร ยคยฐร ยฅหร ยคโข ร ยคโขร ยคโร ยคยชร ยคยพร ยคโกร ยคยฒ ร ยคโขร ยคยฟร ยคยฏร ยคยพ ร ยคลร ยคยพ ร ยคยฐร ยคยนร ยคยพ ร ยคยนร ยฅห...")

                  val tempFile = File(context.getExternalFilesDir(Environment.DIRECTORY_MUSIC), "$title.wav")
                  val params = Bundle().apply {
                      putString(TextToSpeech.Engine.KEY_PARAM_UTTERANCE_ID, "zeeshan_audio_export")
                  }

                  val result = tts?.synthesizeToFile(text, params, tempFile, "zeeshan_audio_export")
                  if (result == TextToSpeech.SUCCESS) {
                      tts?.setOnUtteranceProgressListener(object : UtteranceProgressListener() {
                          override fun onStart(utteranceId: String?) {}
                          override fun onDone(utteranceId: String?) {
                              saveToPublicMusicFolder(context, tempFile, title)
                              onStatusUpdate("รฐลธลฝโฐ ร ยคยธร ยคยนร ยฅโกร ยคลร ยคยพ ร ยคโร ยคยฏร ยคยพ! ร ยคลธร ยฅยร ยคยฐร ยฅหร ยคโข ร ยคยซร ยฅโนร ยคยจ ร ยคยธร ยฅยร ยคลธร ยฅโนร ยคยฐร ยฅโกร ยคล ร ยคโขร ยฅโก 'Music/Zeeshan_Audios' ร ยคยซร ยคยผร ยฅโนร ยคยฒร ยฅยร ยคยกร ยคยฐ ร ยคยฎร ยฅโกร ยคโ ร ยคโฐร ยคยชร ยคยฒร ยคยฌร ยฅยร ยคยง ร ยคยนร ยฅหร ยฅยค")
                          }
                          override fun onError(utteranceId: String?) {
                              onStatusUpdate("รขยล ร ยคยฐร ยฅโกร ยคโร ยคยกร ยคยฐร ยคยฟร ยคโร ยคโ ร ยคยซร ยฅโกร ยคยฒ ร ยคยนร ยฅโน ร ยคโร ยคหร ยฅยค")
                          }
                      })
                  } else {
                      onStatusUpdate("รขยล ร ยคโร ยคยกร ยคยฟร ยคยฏร ยฅโน ร ยคยธร ยคยฟร ยคโร ยคยฅร ยฅโกร ยคยธร ยคยพร ยคโกร ยคลร ยคยผร ยคยฐ ร ยคโขร ยฅโน ร ยคยชร ยฅยร ยคยฐร ยคยพร ยคยฐร ยคโร ยคยญ ร ยคโขร ยคยฐร ยคยจร ยฅโก ร ยคยฎร ยฅโกร ยคโ ร ยคโฆร ยคยธร ยคยฎร ยคยฐร ยฅยร ยคยฅร ยฅยค")
                  }
              }

              private fun saveToPublicMusicFolder(context: Context, srcFile: File, title: String) {
                  val resolver = context.contentResolver
                  val audioCollection = if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                      MediaStore.Audio.Media.getContentUri(MediaStore.VOLUME_EXTERNAL_PRIMARY)
                  } else {
                      MediaStore.Audio.Media.EXTERNAL_CONTENT_URI
                  }

                  val trackDetails = ContentValues().apply {
                      put(MediaStore.Audio.Media.DISPLAY_NAME, "$title.wav")
                      put(MediaStore.Audio.Media.MIME_TYPE, "audio/wav")
                      put(MediaStore.Audio.Media.TITLE, title)
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                          put(MediaStore.Audio.Media.RELATIVE_PATH, "${Environment.DIRECTORY_MUSIC}/Zeeshan_Audios")
                      }
                  }

                  val uri = resolver.insert(audioCollection, trackDetails)
                  uri?.let { destUri ->
                      resolver.openOutputStream(destUri)?.use { outputStream ->
                          srcFile.inputStream().use { inputStream ->
                              inputStream.copyTo(outputStream)
                          }
                      }
                  }
              }

              fun stop() { tts?.stop() }
              fun shutdown() { tts?.shutdown() }
          }
          EOF

      - name: 8. Build Optimized App Controller (MainActivity.kt)
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/audio/MainActivity.kt
          package com.zeeshan.audio

          import android.app.Activity
          import android.content.Intent
          import android.net.Uri
          import android.os.Bundle
          import android.widget.*
          import androidx.activity.result.contract.ActivityResultContracts
          import androidx.appcompat.app.AppCompatActivity
          import androidx.lifecycle.lifecycleScope
          import com.zeeshan.audio.engine.TTSEngineManager
          import com.zeeshan.audio.utils.PDFExtractor
          import kotlinx.coroutines.launch

          class MainActivity : AppCompatActivity() {
              private lateinit var ttsManager: TTSEngineManager
              private lateinit var etGitaText: EditText
              private lateinit var tvStatus: TextView
              private var currentSpeed: Float = 1.0f

              private val pdfPickerLauncher = registerForActivityResult(
                  ActivityResultContracts.StartActivityForResult()
              ) { result ->
                  if (result.resultCode == Activity.RESULT_OK) {
                      result.data?.data?.let { uri -> loadPdfText(uri) }
                  }
              }

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)

                  PDFExtractor.init(this)
                  etGitaText = findViewById(R.id.etGitaText)
                  tvStatus = findViewById(R.id.tvStatus)

                  val btnUploadPdf = findViewById<Button>(R.id.btnUploadPdf)
                  val btnPlayLive = findViewById<Button>(R.id.btnPlayLive)
                  val btnStop = findViewById<Button>(R.id.btnStop)
                  val btnExportAudio = findViewById<Button>(R.id.btnExportAudio)
                  val sbSpeed = findViewById<SeekBar>(R.id.sbSpeed)

                  ttsManager = TTSEngineManager(this) {
                      runOnUiThread { tvStatus.text = "ร ยคยธร ยคยฟร ยคยธร ยฅยร ยคลธร ยคยฎ ร ยคยธร ยฅยร ยคยฅร ยคยฟร ยคยคร ยคยฟ: ร ยคยร ยคโ ร ยคห ร ยคโร ยคยกร ยคยฟร ยคยฏร ยฅโน ร ยคโขร ยฅโนร ยคยฐ ร ยคยธร ยคโขร ยฅยร ยคยฐร ยคยฟร ยคยฏ ร ยคยนร ยฅห!" }
                  }

                  btnUploadPdf.setOnClickListener {
                      val intent = Intent(Intent.ACTION_GET_CONTENT).apply {
                          type = "application/pdf"
                          addCategory(Intent.CATEGORY_OPENABLE)
                      }
                      pdfPickerLauncher.launch(intent)
                  }

                  btnPlayLive.setOnClickListener {
                      val text = etGitaText.text.toString()
                      if (text.isNotEmpty()) {
                          ttsManager.setSpeed(currentSpeed)
                          ttsManager.speakLive(text)
                          tvStatus.text = "ร ยคยธร ยฅยร ยคยฅร ยคยฟร ยคยคร ยคยฟ: ร ยคยฒร ยคยพร ยคโกร ยคยต ร ยคยฌร ยฅยร ยคยฐร ยฅโฐร ยคยกร ยคโขร ยคยพร ยคยธร ยฅยร ยคลธ ร ยคลกร ยคยพร ยคยฒร ยฅโ ร ยคยนร ยฅห..."
                      } else {
                          Toast.makeText(this, "ร ยคโขร ยฅฦร ยคยชร ยคยฏร ยคยพ ร ยคยชร ยคยนร ยคยฒร ยฅโก ร ยคโขร ยฅโนร ยคห ร ยคโขร ยคโร ยคลธร ยฅโกร ยคโร ยคลธ ร ยคโกร ยคยจร ยคยชร ยฅยร ยคลธ ร ยคโขร ยคยฐร ยฅโกร ยคโ!", Toast.LENGTH_SHORT).show()
                      }
                  }

                  btnStop.setOnClickListener {
                      ttsManager.stop()
                      tvStatus.text = "ร ยคยธร ยฅยร ยคยฅร ยคยฟร ยคยคร ยคยฟ: ร ยคโร ยคยกร ยคยฟร ยคยฏร ยฅโน ร ยคยฌร ยคโร ยคยฆ ร ยคโขร ยคยฟร ยคยฏร ยคยพ ร ยคโร ยคยฏร ยคยพ"
                  }

                  btnExportAudio.setOnClickListener {
                      val text = etGitaText.text.toString()
                      if (text.isNotEmpty()) {
                          ttsManager.setSpeed(currentSpeed)
                          ttsManager.exportToGallery(text, "Zeeshan_Studio_Track_${System.currentTimeMillis()}") { msg ->
                              runOnUiThread { tvStatus.text = msg }
                          }
                      } else {
                          Toast.makeText(this, "ร ยคโขร ยคยจร ยคยตร ยคยฐร ยฅยร ยคลธ ร ยคโขร ยคยฐร ยคยจร ยฅโก ร ยคโขร ยฅโก ร ยคยฒร ยคยฟร ยคย ร ยคโขร ยฅโนร ยคห ร ยคลธร ยฅโกร ยคโขร ยฅยร ยคยธร ยฅยร ยคลธ ร ยคยจร ยคยนร ยฅโฌร ยคโ ร ยคยฎร ยคยฟร ยคยฒร ยคยพ!", Toast.LENGTH_SHORT).show()
                      }
                  }

                  sbSpeed.setOnSeekBarChangeListener(object : SeekBar.OnSeekBarChangeListener {
                      override fun onProgressChanged(seekBar: SeekBar?, progress: Int, fromUser: Boolean) {
                          currentSpeed = 0.5f + (progress / 20.0f) * 1.5f
                      }
                      override fun onStartTrackingTouch(seekBar: SeekBar?) {}
                      override fun onStopTrackingTouch(seekBar: SeekBar?) {
                          ttsManager.setSpeed(currentSpeed)
                      }
                  })
              }

              private fun loadPdfText(uri: Uri) {
                  tvStatus.text = "ร ยคยร ยคโ ร ยคห ร ยคยกร ยฅโฌร ยคยช ร ยคยธร ยฅยร ยคโขร ยฅหร ยคยจ: ร ยคยชร ยฅโฌร ยคยกร ยฅโฌร ยคยร ยคยซ ร ยคโขร ยคยพ ร ยคยตร ยคยฟร ยคยถร ยฅยร ยคยฒร ยฅโกร ยคยทร ยคยฃ ร ยคโขร ยคยฟร ยคยฏร ยคยพ ร ยคลร ยคยพ ร ยคยฐร ยคยนร ยคยพ ร ยคยนร ยฅห..."
                  lifecycleScope.launch {
                      val extractedText = PDFExtractor.extractText(this@MainActivity, uri)
                      etGitaText.setText(extractedText)
                      tvStatus.text = "ร ยคยธร ยฅยร ยคยฅร ยคยฟร ยคยคร ยคยฟ: ร ยคยชร ยฅโฌร ยคยกร ยฅโฌร ยคยร ยคยซ ร ยคยธร ยคยซร ยคยฒร ยคยคร ยคยพร ยคยชร ยฅโร ยคยฐร ยฅยร ยคยตร ยคโข ร ยคโกร ยคยฎร ยฅยร ยคยชร ยฅโนร ยคยฐร ยฅยร ยคลธ ร ยคยนร ยฅโน ร ยคโร ยคห!"
                  }
              }

              override fun onDestroy() {
                  super.onDestroy()
                  ttsManager.shutdown()
              }
          }
          EOF

      - name: 9. Write Production Security Manifest (AndroidManifest.xml)
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28"/>

              <queries>
                  <intent>
                      <action android:name="android.intent.action.TTS_SERVICE" />
                  </intent>
              </queries>

              <application
                  android:allowBackup="true"
                  android:icon="@drawable/app_icon"
                  android:label="@string/app_name"
                  android:roundIcon="@drawable/app_icon"
                  android:supportsRtl="true"
                  android:requestLegacyExternalStorage="true"
                  android:theme="@style/Theme.ZeeshanAudio">
                  <activity
                      android:name=".MainActivity"
                      android:configChanges="orientation|screenSize"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 10. Configure Stable Gradle Build Matrix & Core Dependencies
        run: |
          cat << 'EOF' > build.gradle
          plugins {
              id 'com.android.application' version '8.2.2' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.10' apply false
          }
          EOF

          cat << 'EOF' > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4g
          EOF

          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          include ':app'
          EOF

          cat << 'EOF' > app/build.gradle
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }

          android {
              namespace 'com.zeeshan.audio'
              compileSdk 34

              defaultConfig {
                  applicationId "com.zeeshan.audio"
                  minSdk 26
                  targetSdk 34
                  versionCode 3
                  versionName "3.0-StudioPro"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }

              // FIX: Java aur Kotlin dono ko same target (17) par set kiya
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'com.tom-roush:pdfbox-android:2.0.27.0'
              implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
              implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.6.2'
          }
          EOF

      - name: 11. Run Build Engine & Compile Secure APK
        run: |
          gradle assembleDebug

      - name: 12. Deliver Final Artifact Package to User Storage
        uses: actions/upload-artifact@v4
        with:
          name: Zeeshan-Audio-Pro-Package
          path: app/build/outputs/apk/debug/*.apk
