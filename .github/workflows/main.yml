name: Build Zeeshan Audio Official Pro App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 2.5 Setup Fixed Gradle 8.5 Engine
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: 3. Create Android Directory Structure
        run: |
          mkdir -p app/src/main/java/com/zeeshan/audio/engine
          mkdir -p app/src/main/java/com/zeeshan/audio/utils
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable

      - name: 4. Design Premium Black-Green-White Identity & Vectors (Hindi text via Base64 to avoid encoding corruption)
        run: |
          echo "PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPHJlc291cmNlcz4KICAgIDxzdHJpbmcgbmFtZT0iYXBwX25hbWUiPuCknOClgOCktuCkvuCkqCDgpJHgpKHgpL/gpK/gpYs8L3N0cmluZz4KPC9yZXNvdXJjZXM+Cg==" | base64 -d > app/src/main/res/values/strings.xml

          cat << 'EOF' > app/src/main/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="studio_black">#0A0F0D</color>
              <color name="matrix_green">#00C853</color>
              <color name="pure_white">#FFFFFFFF</color>
              <color name="surface_dark_card">#121815</color>
              <color name="text_secondary_muted">#A0AAB2</color>
              <color name="stop_btn_gray">#2A312E</color>
          </resources>
          EOF

          cat << 'EOF' > app/src/main/res/values/themes.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.ZeeshanAudio" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="colorPrimary">@color/matrix_green</item>
                  <item name="colorSecondary">@color/pure_white</item>
                  <item name="android:windowBackground">@color/studio_black</item>
              </style>
          </resources>
          EOF

          cat << 'EOF' > app/src/main/res/drawable/app_icon.xml
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="512dp" android:height="512dp"
              android:viewportWidth="100" android:viewportHeight="100">
              <path android:pathData="M50,50m-46,0a46,46 0,1 1,92 0a46,46 0,1 1,-92 0" android:fillColor="#0A0F0D"/>
              <path android:pathData="M50,50m-44,0a44,44 0,1 1,88 0a44,44 0,1 1,-88 0" android:strokeColor="#00C853" android:strokeWidth="2.5" android:fillColor="#00000000"/>
              <path android:pathData="M50,50m-41,0a41,41 0,1 1,82 0a41,41 0,1 1,-82 0" android:strokeColor="#FFFFFF" android:strokeWidth="0.8" android:fillColor="#00000000"/>
              <path android:pathData="M34,24 L66,24 L66,31 L45,53 L66,53 L66,60 L34,60 L34,53 L55,31 L34,31 Z" android:fillColor="#FFFFFF" android:strokeColor="#00C853" android:strokeWidth="1"/>
              <path android:pathData="M50,67 L50,83" android:strokeColor="#FFFFFF" android:strokeWidth="3.5" android:strokeLineCap="round"/>
              <path android:pathData="M43,70 L43,80" android:strokeColor="#00C853" android:strokeWidth="3" android:strokeLineCap="round"/>
              <path android:pathData="M57,70 L57,80" android:strokeColor="#00C853" android:strokeWidth="3" android:strokeLineCap="round"/>
              <path android:pathData="M36,73 L36,77" android:strokeColor="#FFFFFF" android:strokeWidth="2.5" android:strokeLineCap="round"/>
              <path android:pathData="M64,73 L64,77" android:strokeColor="#FFFFFF" android:strokeWidth="2.5" android:strokeLineCap="round"/>
          </vector>
          EOF

          cat << 'EOF' > app/src/main/res/drawable/neon_input_border.xml
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#121815"/>
              <corners android:radius="14dp"/>
              <stroke android:width="2dp" android:color="#00C853"/>
          </shape>
          EOF

      - name: 5. Build Advanced Studio Dashboard UI (activity_main.xml via Base64)
        run: |
          echo "" | base64 -d > app/src/main/res/layout/activity_main.xml

      - name: 6. Build High-Performance PDF Extractor (PDFExtractor.kt)
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/audio/utils/PDFExtractor.kt
          package com.zeeshan.audio.utils

          import android.content.Context
          import android.net.Uri
          import com.tom_roush.pdfbox.android.PDFBoxResourceLoader
          import com.tom_roush.pdfbox.pdmodel.PDDocument
          import com.tom_roush.pdfbox.text.PDFTextStripper
          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.withContext

          object PDFExtractor {
              fun init(context: Context) {
                  PDFBoxResourceLoader.init(context)
              }

              suspend fun extractText(context: Context, uri: Uri): String = withContext(Dispatchers.IO) {
                  var pdfDocument: PDDocument? = null
                  try {
                      val inputStream = context.contentResolver.openInputStream(uri)
                      pdfDocument = PDDocument.load(inputStream)
                      val stripper = PDFTextStripper().apply {
                          sortByPosition = true
                      }
                      return@withContext stripper.getText(pdfDocument) ?: ""
                  } catch (e: Exception) {
                      e.printStackTrace()
                      return@withContext "PDF decode failed: ${e.localizedMessage}"
                  } finally {
                      try { pdfDocument?.close() } catch (ex: Exception) {}
                  }
              }
          }
          EOF

      - name: 7. Build Core AI Speech Engine (TTSEngineManager.kt via Base64)
        run: |
          echo "" | base64 -d > app/src/main/java/com/zeeshan/audio/engine/TTSEngineManager.kt

      - name: 8. Build Optimized App Controller (MainActivity.kt via Base64)
        run: |
          echo "" | base64 -d > app/src/main/java/com/zeeshan/audio/MainActivity.kt

      - name: 9. Write Production Security Manifest (AndroidManifest.xml)
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28"/>

              <queries>
                  <intent>
                      <action android:name="android.intent.action.TTS_SERVICE" />
                  </intent>
              </queries>

              <application
                  android:allowBackup="true"
                  android:icon="@drawable/app_icon"
                  android:label="@string/app_name"
                  android:roundIcon="@drawable/app_icon"
                  android:supportsRtl="true"
                  android:requestLegacyExternalStorage="true"
                  android:theme="@style/Theme.ZeeshanAudio">
                  <activity
                      android:name=".MainActivity"
                      android:configChanges="orientation|screenSize"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 10. Configure Stable Gradle Build Matrix & Core Dependencies
        run: |
          cat << 'EOF' > build.gradle
          plugins {
              id 'com.android.application' version '8.2.2' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.10' apply false
          }
          EOF

          cat << 'EOF' > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4g
          EOF

          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          include ':app'
          EOF

          cat << 'EOF' > app/build.gradle
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }

          android {
              namespace 'com.zeeshan.audio'
              compileSdk 34

              defaultConfig {
                  applicationId "com.zeeshan.audio"
                  minSdk 26
                  targetSdk 34
                  versionCode 3
                  versionName "3.0-StudioPro"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'com.tom-roush:pdfbox-android:2.0.27.0'
              implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
              implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.6.2'
          }
          EOF

      - name: 11. Run Build Engine & Compile Secure APK
        run: |
          gradle assembleDebug

      - name: 12. Deliver Final Artifact Package to User Storage
        uses: actions/upload-artifact@v4
        with:
          name: Zeeshan-Audio-Pro-Package
          path: app/build/outputs/apk/debug/*.apk
