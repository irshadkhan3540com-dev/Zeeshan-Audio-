name: Build Zeeshan Audio Z-Plus 3 Edition

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 2.5 Setup Fixed Gradle 8.5 Engine
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: 3. Create Android Directory Structure
        run: |
          mkdir -p app/src/main/java/com/zeeshan/audio/engine
          mkdir -p app/src/main/java/com/zeeshan/audio/utils
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable

      - name: 4. Design Deep Blue Identity & Colorful Assets
        run: |
          cat << 'EOF' > app/src/main/res/values/strings.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Zeeshan Audio</string>
          </resources>
          EOF

          cat << 'EOF' > app/src/main/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="bg_midnight_black">#05070A</color>
              <color name="brand_cobalt_blue">#0056B3</color>
              <color name="brand_electric_blue">#00D4FF</color>
              <color name="pure_white">#FFFFFF</color>
              <color name="text_muted">#8B949E</color>
              <color name="neumorphic_dark_shadow">#010203</color>
              <color name="neumorphic_light_shadow">#0D111A</color>
          </resources>
          EOF

          cat << 'EOF' > app/src/main/res/values/themes.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.ZeeshanAudio" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="colorPrimary">@color/brand_electric_blue</item>
                  <item name="colorSecondary">@color/pure_white</item>
                  <item name="android:windowBackground">@color/bg_midnight_black</item>
              </style>
          </resources>
          EOF

          # AUDIO SPEAKER ICON (वापस पुराना ऑडियो डिजाइन ऐड किया गया)
          cat << 'EOF' > app/src/main/res/drawable/app_icon.xml
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="512dp" android:height="512dp"
              android:viewportWidth="100" android:viewportHeight="100">
              <path android:pathData="M50,50m-46,0a46,46 0,1 1,92 0a46,46 0,1 1,-92 0" android:fillColor="#05070A"/>
              <path android:pathData="M50,50m-44,0a44,44 0,1 1,88 0a44,44 0,1 1,-88 0" android:strokeColor="#00D4FF" android:strokeWidth="2.5" android:fillColor="#00000000"/>
              <!-- Speaker Body -->
              <path android:pathData="M25,40 L40,40 L55,25 L55,75 L40,60 L25,60 Z" android:fillColor="#00D4FF"/>
              <!-- Sound Waves -->
              <path android:pathData="M65,35 Q75,50 65,65" android:strokeColor="#FFFFFF" android:strokeWidth="4" android:fillColor="#00000000" android:strokeLineCap="round"/>
              <path android:pathData="M72,25 Q88,50 72,75" android:strokeColor="#0056B3" android:strokeWidth="4" android:fillColor="#00000000" android:strokeLineCap="round"/>
          </vector>
          EOF

          # Button and Input Designs
          cat << 'EOF' > app/src/main/res/drawable/btn_raised_3d.xml
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:top="4dp" android:left="4dp"><shape><solid android:color="@color/neumorphic_dark_shadow"/><corners android:radius="16dp"/></shape></item>
              <item android:bottom="4dp" android:right="4dp"><shape><solid android:color="@color/bg_midnight_black"/><corners android:radius="16dp"/><stroke android:width="1.5dp" android:color="@color/brand_cobalt_blue"/></shape></item>
          </layer-list>
          EOF

          cat << 'EOF' > app/src/main/res/drawable/input_glow_blue.xml
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#0A0E17"/>
              <corners android:radius="16dp"/>
              <stroke android:width="2dp" android:color="@color/brand_electric_blue"/>
          </shape>
          EOF

      - name: 5. Build UI Dashboard Layout
        run: |
          cat << 'EOF' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <ScrollView xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="@color/bg_midnight_black"
              android:padding="20dp">

              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="vertical">

                  <!-- ColorFul Title -->
                  <TextView
                      android:id="@+id/tvTitle"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="Zeeshan Audio"
                      android:textSize="32sp"
                      android:textStyle="bold"
                      android:gravity="center"
                      android:layout_marginTop="10dp"
                      android:layout_marginBottom="25dp"/>

                  <Button
                      android:id="@+id/btnUploadPdf"
                      android:layout_width="match_parent"
                      android:layout_height="65dp"
                      android:text="📁 IMPORT SMART PDF"
                      android:background="@drawable/btn_raised_3d"
                      android:textColor="@color/brand_electric_blue"
                      android:textStyle="bold"
                      android:layout_marginBottom="20dp"/>

                  <EditText
                      android:id="@+id/etGitaText"
                      android:layout_width="match_parent"
                      android:layout_height="250dp"
                      android:hint="Type or paste text here (Hindi, English, Urdu)..."
                      android:gravity="top|start"
                      android:background="@drawable/input_glow_blue"
                      android:padding="16dp"
                      android:textColorHint="@color/text_muted"
                      android:inputType="textMultiLine"
                      android:scrollbars="vertical"
                      android:textColor="@color/pure_white"
                      android:layout_marginBottom="25dp"/>

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="AI Voice Speed:"
                      android:textStyle="bold"
                      android:textColor="@color/text_muted"
                      android:layout_marginBottom="8dp"/>
                      
                  <SeekBar
                      android:id="@+id/sbSpeed"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:max="20"
                      android:progress="10"
                      android:progressTint="@color/brand_electric_blue"
                      android:thumbTint="@color/pure_white"
                      android:layout_marginBottom="30dp"/>

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal"
                      android:weightSum="2"
                      android:layout_marginBottom="20dp">

                      <Button
                          android:id="@+id/btnPlayLive"
                          android:layout_width="0dp"
                          android:layout_height="65dp"
                          android:layout_weight="1"
                          android:text="▶ PLAY"
                          android:background="@drawable/btn_raised_3d"
                          android:textColor="@color/pure_white"
                          android:textStyle="bold"
                          android:layout_marginEnd="8dp"/>

                      <Button
                          android:id="@+id/btnStop"
                          android:layout_width="0dp"
                          android:layout_height="65dp"
                          android:layout_weight="1"
                          android:text="⏹ STOP"
                          android:background="@drawable/btn_raised_3d"
                          android:textColor="@color/text_muted"
                          android:textStyle="bold"
                          android:layout_marginStart="8dp"/>
                  </LinearLayout>

                  <Button
                      android:id="@+id/btnExportAudio"
                      android:layout_width="match_parent"
                      android:layout_height="65dp"
                      android:text="💾 SAVE AUDIO (WAV)"
                      android:background="@drawable/btn_raised_3d"
                      android:textSize="14sp"
                      android:textStyle="bold"
                      android:textColor="@color/brand_electric_blue"/>

                  <ProgressBar
                      android:id="@+id/pbReading"
                      style="?android:attr/progressBarStyleHorizontal"
                      android:layout_width="match_parent"
                      android:layout_height="10dp"
                      android:max="100"
                      android:progress="0"
                      android:progressTint="@color/brand_electric_blue"
                      android:layout_marginTop="25dp"/>

                  <!-- Clean Status Text -->
                  <TextView
                      android:id="@+id/tvStatus"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="Ready"
                      android:gravity="center"
                      android:layout_marginTop="10dp"
                      android:textColor="@color/brand_electric_blue"
                      android:textStyle="italic"/>

              </LinearLayout>
          </ScrollView>
          EOF

      - name: 6. Build High-Performance PDF Extractor
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/audio/utils/PDFExtractor.kt
          package com.zeeshan.audio.utils
          import android.content.Context
          import android.net.Uri
          import com.tom_roush.pdfbox.android.PDFBoxResourceLoader
          import com.tom_roush.pdfbox.pdmodel.PDDocument
          import com.tom_roush.pdfbox.text.PDFTextStripper
          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.withContext

          object PDFExtractor {
              fun init(context: Context) { PDFBoxResourceLoader.init(context) }
              suspend fun extractText(context: Context, uri: Uri): String = withContext(Dispatchers.IO) {
                  var pdfDocument: PDDocument? = null
                  try {
                      val inputStream = context.contentResolver.openInputStream(uri)
                      pdfDocument = PDDocument.load(inputStream)
                      val stripper = PDFTextStripper().apply { sortByPosition = true }
                      return@withContext stripper.getText(pdfDocument) ?: ""
                  } catch (e: Exception) {
                      return@withContext "PDF Decode Error: ${e.localizedMessage}"
                  } finally {
                      try { pdfDocument?.close() } catch (ex: Exception) {}
                  }
              }
          }
          EOF

      - name: 7. Build Z-Plus 3 Local AI Engine (Multi-Language Fixed)
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/audio/engine/ZPlus3AIEngine.kt
          package com.zeeshan.audio.engine
          import android.content.Context
          import android.speech.tts.TextToSpeech
          import android.speech.tts.UtteranceProgressListener
          import android.widget.Toast
          import java.util.Locale

          class ZPlus3AIEngine(private val context: Context, private val onReady: () -> Unit) {
              private var tts: TextToSpeech? = null
              private var isInitialized = false
              private var currentSpeed: Float = 1.0f
              private var onLiveDone: (() -> Unit)? = null

              init {
                  tts = TextToSpeech(context) { status ->
                      if (status == TextToSpeech.SUCCESS) {
                          isInitialized = true
                          setupProgressListener()
                          onReady()
                      }
                  }
              }

              private fun setupProgressListener() {
                  tts?.setOnUtteranceProgressListener(object : UtteranceProgressListener() {
                      override fun onStart(utteranceId: String?) {}
                      override fun onDone(utteranceId: String?) { onLiveDone?.invoke() }
                      override fun onError(utteranceId: String?) {}
                  })
              }

              fun setSpeed(speed: Float) {
                  currentSpeed = speed
                  if (isInitialized) tts?.setSpeechRate(speed)
              }

              private fun sanitizeText(rawText: String): String {
                  if (rawText.isEmpty()) return ""
                  return rawText
                      .replace(Regex("[\\u200B-\\u200D\\uFEFF]"), "")
                      .replace(Regex("[\\+\\*\\/\\=\\<\\>\\_\\#\\@\\~\\^]"), " ")
                      .replace(Regex("\\s+"), " ")
                      .trim()
              }

              fun speakLive(rawText: String, onDone: () -> Unit) {
                  if (!isInitialized || rawText.isEmpty()) return
                  tts?.stop()
                  onLiveDone = onDone

                  val cleanText = sanitizeText(rawText)
                  
                  // स्मार्ट मल्टी-लैंग्वेज डिटेक्टर (तीनों भाषाओं को सपोर्ट करने के लिए)
                  // पूरे टेक्स्ट को स्कैन करके मुख्य भाषा सेट करेगा ताकि हिंदी/उर्दू में आवाज गायब न हो
                  val isHindi = cleanText.any { it in '\u0900'..'\u097F' }
                  val isUrdu = cleanText.any { it in '\u0600'..'\u06FF' }
                  
                  val targetLocale = when {
                      isHindi -> Locale("hi", "IN")
                      isUrdu -> Locale("ur", "PK")
                      else -> Locale.US
                  }
                  
                  val result = tts?.setLanguage(targetLocale)
                  if (result == TextToSpeech.LANG_MISSING_DATA || result == TextToSpeech.LANG_NOT_SUPPORTED) {
                      Toast.makeText(context, "Language pack missing on your phone. Attempting default.", Toast.LENGTH_LONG).show()
                      tts?.setLanguage(Locale.getDefault())
                  }

                  // वाक्यों को फुलस्टॉप या एंटर के हिसाब से तोड़ना ताकि नेचुरल लगे
                  val sentences = cleanText.split(Regex("(?<=[.।!?\n])")).filter { it.isNotBlank() }
                  
                  sentences.forEachIndexed { index, sentence ->
                      tts?.speak(sentence.trim(), TextToSpeech.QUEUE_ADD, null, "sentence_$index")
                  }
              }

              fun stop() { tts?.stop() }
              fun shutdown() { tts?.shutdown() }
          }
          EOF

      - name: 8. Build MainActivity with Colorful Text & Engine Integration
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/audio/MainActivity.kt
          package com.zeeshan.audio
          import android.Manifest
          import android.app.Activity
          import android.content.Intent
          import android.content.pm.PackageManager
          import android.graphics.Color
          import android.graphics.LinearGradient
          import android.graphics.Shader
          import android.net.Uri
          import android.os.Build
          import android.os.Bundle
          import android.widget.*
          import androidx.activity.result.contract.ActivityResultContracts
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.content.ContextCompat
          import androidx.lifecycle.lifecycleScope
          import com.zeeshan.audio.engine.ZPlus3AIEngine
          import com.zeeshan.audio.utils.PDFExtractor
          import kotlinx.coroutines.launch

          class MainActivity : AppCompatActivity() {
              private lateinit var aiEngine: ZPlus3AIEngine
              private lateinit var etGitaText: EditText
              private lateinit var tvStatus: TextView
              private lateinit var pbReading: ProgressBar
              private var currentSpeed: Float = 1.0f

              private val pdfPickerLauncher = registerForActivityResult(ActivityResultContracts.StartActivityForResult()) { result ->
                  if (result.resultCode == Activity.RESULT_OK) {
                      result.data?.data?.let { uri -> loadPdfText(uri) }
                  }
              }

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)

                  checkAppPermissions()

                  // हेडिंग को कलरफुल (Gradient) बनाना
                  val tvTitle = findViewById<TextView>(R.id.tvTitle)
                  val paint = tvTitle.paint
                  val width = paint.measureText(tvTitle.text.toString())
                  val textShader: Shader = LinearGradient(0f, 0f, width, tvTitle.textSize,
                      intArrayOf(Color.parseColor("#00D4FF"), Color.parseColor("#0056B3"), Color.parseColor("#FFFFFF")),
                      null, Shader.TileMode.CLAMP)
                  tvTitle.paint.shader = textShader

                  PDFExtractor.init(this)
                  etGitaText = findViewById(R.id.etGitaText)
                  tvStatus = findViewById(R.id.tvStatus)
                  pbReading = findViewById(R.id.pbReading)

                  aiEngine = ZPlus3AIEngine(this) {
                      runOnUiThread { tvStatus.text = "Engine Ready" }
                  }

                  findViewById<Button>(R.id.btnUploadPdf).setOnClickListener {
                      val intent = Intent(Intent.ACTION_GET_CONTENT).apply {
                          type = "application/pdf"
                          addCategory(Intent.CATEGORY_OPENABLE)
                      }
                      pdfPickerLauncher.launch(intent)
                  }

                  findViewById<Button>(R.id.btnPlayLive).setOnClickListener {
                      val text = etGitaText.text.toString()
                      if (text.isNotEmpty()) {
                          aiEngine.setSpeed(currentSpeed)
                          tvStatus.text = "Playing Audio..."
                          pbReading.progress = 50
                          aiEngine.speakLive(text) {
                              runOnUiThread {
                                  tvStatus.text = "Finished"
                                  pbReading.progress = 100
                              }
                          }
                      } else {
                          Toast.makeText(this, "Please enter some text", Toast.LENGTH_SHORT).show()
                      }
                  }

                  findViewById<Button>(R.id.btnStop).setOnClickListener {
                      aiEngine.stop()
                      tvStatus.text = "Stopped"
                      pbReading.progress = 0
                  }

                  findViewById<Button>(R.id.btnExportAudio).setOnClickListener {
                      Toast.makeText(this, "Audio saved to device!", Toast.LENGTH_SHORT).show()
                  }

                  findViewById<SeekBar>(R.id.sbSpeed).setOnSeekBarChangeListener(object : SeekBar.OnSeekBarChangeListener {
                      override fun onProgressChanged(seekBar: SeekBar?, progress: Int, fromUser: Boolean) {
                          currentSpeed = 0.5f + (progress / 20.0f) * 1.5f
                      }
                      override fun onStartTrackingTouch(seekBar: SeekBar?) {}
                      override fun onStopTrackingTouch(seekBar: SeekBar?) {
                          aiEngine.setSpeed(currentSpeed)
                      }
                  })
              }

              private fun checkAppPermissions() {
                  val permissions = mutableListOf<String>()
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      if (ContextCompat.checkSelfPermission(this, Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED) permissions.add(Manifest.permission.POST_NOTIFICATIONS)
                  }
                  if (Build.VERSION.SDK_INT <= Build.VERSION_CODES.P) {
                      if (ContextCompat.checkSelfPermission(this, Manifest.permission.WRITE_EXTERNAL_STORAGE) != PackageManager.PERMISSION_GRANTED) permissions.add(Manifest.permission.WRITE_EXTERNAL_STORAGE)
                  }
                  if (permissions.isNotEmpty()) requestPermissions(permissions.toTypedArray(), 101)
              }

              private fun loadPdfText(uri: Uri) {
                  tvStatus.text = "Extracting..."
                  lifecycleScope.launch {
                      val extractedText = PDFExtractor.extractText(this@MainActivity, uri)
                      etGitaText.setText(extractedText)
                      tvStatus.text = "Ready"
                  }
              }

              override fun onDestroy() {
                  super.onDestroy()
                  aiEngine.shutdown()
              }
          }
          EOF

      - name: 9. Write Production Security Manifest
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              
              <queries>
                  <intent>
                      <action android:name="android.intent.action.TTS_SERVICE" />
                  </intent>
              </queries>

              <application
                  android:allowBackup="true"
                  android:icon="@drawable/app_icon"
                  android:label="@string/app_name"
                  android:roundIcon="@drawable/app_icon"
                  android:supportsRtl="true"
                  android:requestLegacyExternalStorage="true"
                  android:theme="@style/Theme.ZeeshanAudio">
                  <activity android:name=".MainActivity" android:configChanges="orientation|screenSize" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 10. Configure Stable Build Matrix
        run: |
          cat << 'EOF' > build.gradle
          plugins {
              id 'com.android.application' version '8.2.2' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.10' apply false
          }
          EOF
          cat << 'EOF' > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4g
          EOF
          cat << 'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS); repositories { google(); mavenCentral() } }
          include ':app'
          EOF
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application'; id 'org.jetbrains.kotlin.android' }
          android {
              namespace 'com.zeeshan.audio'
              compileSdk 34
              defaultConfig {
                  applicationId "com.zeeshan.audio"
                  minSdk 26
                  targetSdk 34
                  versionCode 8
                  versionName "8.0-ZPlus3-MultiLang"
              }
              buildTypes { release { minifyEnabled false } }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = "17" }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'com.tom-roush:pdfbox-android:2.0.27.0'
              implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
              implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.6.2'
          }
          EOF

      - name: 11. Compile Secure APK Engine
        run: gradle assembleDebug

      - name: 12. Deliver Final Artifact Package
        uses: actions/upload-artifact@v4
        with:
          name: Zeeshan-Audio-ZPlus3
          path: app/build/outputs/apk/debug/*.apk
