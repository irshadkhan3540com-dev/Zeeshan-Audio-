        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 2.5 Setup Fixed Gradle 8.5 Engine
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

